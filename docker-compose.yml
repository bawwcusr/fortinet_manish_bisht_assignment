services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: scheduler_db
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-dbs.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d scheduler_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  executor:
    build: ./services/executor
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/executor_db
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/executor_db
    depends_on:
      postgres: {condition: service_healthy}
    # Publish both ports: scheduler shares this network namespace (see below).
    ports: ["8080:8080", "8081:8081"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health', timeout=2)\""]
      interval: 5s
      timeout: 3s
      retries: 10

  scheduler:
    build: ./services/scheduler
    # Share executor's network stack so localhost:8081 reaches the executor
    # (same URL as curl/Postman from the host).
    network_mode: "service:executor"
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/scheduler_db
      ALEMBIC_DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/scheduler_db
      EXECUTOR_BASE_URL: http://localhost:8081
    depends_on:
      postgres: {condition: service_healthy}
      executor: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2)\""]
      interval: 5s
      timeout: 3s
      retries: 10

  # Opt-in one-shot seeder (does not run on a normal `up`, so restarts don't
  # create duplicate tasks). Run explicitly:
  #   docker compose --profile seed run --rm seed
  seed:
    profiles: ["seed"]
    build: ./services/scheduler
    network_mode: "service:executor"
    working_dir: /app
    environment:
      SCHEDULER_URL: http://localhost:8080
    volumes:
      - ./scripts:/app/scripts:ro
    depends_on:
      scheduler: {condition: service_healthy}
    command: ["uv", "run", "python", "scripts/seed.py"]
    restart: "no"

volumes:
  pgdata:
